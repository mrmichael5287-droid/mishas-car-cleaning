<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Misha's Car Cleaning - Solon, Ohio</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f0f7fa;
            color: #1e293b;
            line-height: 1.6;
        }

        /* Glacier Blue Gradient Theme */
        header {
            background: linear-gradient(135deg, #0b2545, #70a1ff);
            color: white;
            text-align: center;
            padding: 4rem 2rem 3rem 2rem;
        }

        header h1 {
            font-size: 3.2rem;
            margin-bottom: 0.5rem;
            letter-spacing: 1px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
        }

        .slogan {
            font-size: 1.3rem;
            color: #e0f2fe;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 1rem;
        }

        .location {
            font-size: 1.1rem;
            opacity: 0.95;
            background: rgba(255, 255, 255, 0.15);
            display: inline-block;
            padding: 0.25rem 1rem;
            border-radius: 20px;
        }

        /* Fixed Navigation Tabs System */
        nav {
            background: #ffffff;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 2px solid #cbd5e1;
        }

        .nav-container {
            max-width: 1100px;
            margin: 0 auto;
            display: flex;
            justify-content: center;
            gap: 1rem;
            padding: 0.5rem 1rem;
        }

        .tab-btn {
            background: none;
            border: none;
            padding: 0.75rem 1.25rem;
            font-size: 1.05rem;
            font-weight: 600;
            color: #475569;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.2s;
        }

        .tab-btn:hover {
            background: #e0f2fe;
            color: #1d4ed8;
        }

        .tab-btn.active {
            background: #70a1ff;
            color: white;
        }

        /* Multi-page Content Panels toggling */
        .page-panel {
            display: none;
        }

        .page-panel.active {
            display: block;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 2.5rem 1.5rem;
        }

        .section-title {
            text-align: center;
            font-size: 2.2rem;
            color: #0b2545;
            margin-bottom: 2rem;
            position: relative;
        }

        .section-title::after {
            content: '';
            display: block;
            width: 60px;
            height: 4px;
            background: #70a1ff;
            margin: 0.5rem auto 0 auto;
            border-radius: 2px;
        }

        /* Package Grids styling with Glacier Accents */
        .grid-3 {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2.5rem;
            margin-bottom: 3rem;
        }

        .card {
            background: white;
            padding: 3rem 2rem;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
            border: 1px solid #cbd5e1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
        }

        .card.featured {
            border: 3px solid #70a1ff;
            position: relative;
        }

        .card.membership {
            border: 3px solid #0b2545;
            background: linear-gradient(180deg, #ffffff, #e0f2fe);
        }

        .badge {
            position: absolute;
            top: -14px;
            left: 50%;
            transform: translateX(-50%);
            background: #70a1ff;
            color: white;
            padding: 0.3rem 1.2rem;
            font-size: 0.85rem;
            border-radius: 20px;
            text-transform: uppercase;
            font-weight: bold;
        }

        .card h3 {
            font-size: 1.75rem;
            color: #0b2545;
            margin-bottom: 1rem;
        }

        .price {
            font-size: 3rem;
            font-weight: 800;
            color: #1e3a8a;
            margin-bottom: 1.5rem;
        }

        .card ul {
            list-style: none;
            margin-bottom: 2rem;
            text-align: left;
        }

        .card ul li {
            margin-bottom: 0.75rem;
            color: #475569;
        }

        .card ul li::before {
            content: "✓";
            color: #70a1ff;
            font-weight: bold;
            margin-right: 10px;
        }

        .asterisk {
            font-size: 0.85rem;
            color: #1e3a8a;
            margin-top: 1rem;
            font-style: italic;
        }

        /* Clean Two-Column Gallery Layout & Display Column */
        .gallery-layout {
            display: grid;
            grid-template-columns: 1fr;
            gap: 2.5rem;
        }

        @media (min-width: 800px) {
            .gallery-layout {
                grid-template-columns: 350px 1fr;
            }
        }

        .work-column-box {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            border: 1px solid #cbd5e1;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            align-self: start;
        }

        .work-column-box h3 {
            color: #0b2545;
            font-size: 1.3rem;
            margin-bottom: 1rem;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 0.5rem;
        }

        .work-column-box p {
            color: #475569;
            font-size: 0.95rem;
            margin-bottom: 0.75rem;
        }

        .work-column-box ul {
            list-style-type: square;
            padding-left: 1.25rem;
            color: #334155;
            font-size: 0.95rem;
        }

        .work-column-box li {
            margin-bottom: 0.5rem;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.5rem;
        }

        .gallery-item {
            background: white;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid #e2e8f0;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        .gallery-img-container {
            width: 100%;
            height: 250px;
            background-color: #cbd5e1;
            position: relative;
        }

        .gallery-img-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .gallery-info {
            padding: 1rem;
            background: white;
            border-top: 1px solid #f1f5f9;
        }

        .gallery-tag {
            display: inline-block;
            background: #e0f2fe;
            color: #0369a1;
            font-size: 0.75rem;
            font-weight: bold;
            padding: 0.2rem 0.6rem;
            border-radius: 4px;
            text-transform: uppercase;
            margin-bottom: 0.25rem;
        }

        .gallery-title {
            font-weight: bold;
            color: #0f172a;
            font-size: 1.05rem;
        }

        /* Interface Info Panel Details */
        .info-panel {
            background: white;
            border-radius: 12px;
            padding: 3rem;
            border: 1px solid #cbd5e1;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            margin-bottom: 3rem;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2rem;
        }

        .info-box h3 {
            color: #0b2545;
            font-size: 1.4rem;
            margin-bottom: 1rem;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 0.5rem;
        }

        .info-box p {
            font-size: 1.1rem;
            color: #475569;
            margin-bottom: 0.5rem;
        }

        .highlight-text {
            font-weight: bold;
            color: #0f172a;
        }

        /* SMS Action Module Box Layout */
        .booking-instruction-section {
            background: #e0f2fe;
            border-radius: 12px;
            padding: 3rem;
            border: 2px dashed #70a1ff;
            text-align: center;
            max-width: 750px;
            margin: 0 auto 2rem auto;
        }

            color: #0b2545;
            font-size:
